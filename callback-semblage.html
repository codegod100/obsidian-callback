<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting to Obsidian...</title>
  <script>
    // Read OAuth params from query string OR hash fragment.
    // AT Protocol PDS sometimes sends auth response in the URL hash.
    (function () {
      const search = new URLSearchParams(window.location.search);
      const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));

      // Prefer query, fall back to hash
      const code = search.get('code') || hash.get('code');
      const state = search.get('state') || hash.get('state');
      const iss = search.get('iss') || hash.get('iss');
      const error = search.get('error') || hash.get('error');
      const errorDesc = search.get('error_description') || hash.get('error_description');

      if (error) {
        document.body.innerHTML = '<h1>Authorization Error</h1><p>' + (errorDesc || error) + '</p>';
        return;
      }

      if (!code) {
        document.body.innerHTML = '<h1>Missing Authorization Code</h1><p>No <code>code</code> found in query or hash. Full URL: <code>' + window.location.href + '</code></p>';
        return;
      }

      // Build obsidian:// redirect with params in query string (hash doesn't survive protocol redirect)
      const redirect = new URLSearchParams();
      if (code) redirect.set('code', code);
      if (state) redirect.set('state', state);
      if (iss) redirect.set('iss', iss);

      window.location.href = 'obsidian://semblage-oauth?' + redirect.toString();
    })();
  </script>
</head>
<body>
  <p>Redirecting to Obsidian...</p>
</body>
</html>
